<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmation AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           DESIGN TOKENS
           ============================================ */
        :root {
            /* Colors - Light Theme (Thomson Reuters) */
            --color-bg-primary: #f8f9fa;
            --color-bg-secondary: #ffffff;
            --color-bg-tertiary: #f1f3f5;
            --color-bg-elevated: #ffffff;
            
            --color-surface-card: #ffffff;
            --color-surface-hover: #f8f9fa;
            
            --color-border-subtle: #e9ecef;
            --color-border-medium: #dee2e6;
            --color-border-strong: #ced4da;
            
            --color-text-primary: #212529;
            --color-text-secondary: #6c757d;
            --color-text-muted: #adb5bd;
            --color-text-inverse: #ffffff;
            
            --color-tr-orange: #ff7f32;
            --color-tr-orange-dark: #e66e29;
            
            --color-primary: #0066cc;
            --color-primary-hover: #0052a3;
            --color-primary-active: #003d7a;
            
            --color-success: #28a745;
            --color-warning: #ffc107;
            --color-error: #dc3545;
            
            /* Typography */
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            
            --font-size-xs: 12px;
            --font-size-sm: 14px;
            --font-size-base: 16px;
            --font-size-lg: 18px;
            --font-size-xl: 24px;
            
            --line-height-tight: 1.25;
            --line-height-normal: 1.5;
            --line-height-relaxed: 1.75;
            
            --font-weight-normal: 400;
            --font-weight-medium: 500;
            --font-weight-semibold: 600;
            
            /* Spacing */
            --space-2: 2px;
            --space-4: 4px;
            --space-8: 8px;
            --space-12: 12px;
            --space-16: 16px;
            --space-24: 24px;
            --space-32: 32px;
            --space-48: 48px;
            
            /* Layout */
            --nav-width: 264px;
            --content-max-width: 1120px;
            --page-padding: 24px;
            
            /* Border Radius */
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            
            /* Shadows */
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.12);
            
            /* Transitions */
            --transition-fast: 120ms ease-out;
            --transition-normal: 180ms ease-out;
        }

        /* ============================================
           RESET & BASE
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
        }

        body {
            font-family: var(--font-family);
            font-size: var(--font-size-base);
            line-height: var(--line-height-normal);
            color: var(--color-text-primary);
            background: var(--color-bg-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ============================================
           APP SHELL
           ============================================ */
        .app-shell {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Left Navigation */
        .left-nav {
            width: var(--nav-width);
            background: var(--color-bg-secondary);
            border-right: 1px solid var(--color-border-subtle);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform var(--transition-normal);
        }

        .left-nav.collapsed {
            transform: translateX(calc(-1 * var(--nav-width)));
        }

        .nav-header {
            padding: var(--space-16) var(--space-24);
            border-bottom: 1px solid var(--color-border-subtle);
            background: var(--color-bg-secondary);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: var(--space-8);
        }

        .nav-logo-icon {
            font-size: 20px;
            font-weight: var(--font-weight-semibold);
            color: var(--color-tr-orange);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .nav-logo-icon::before {
            content: "◆";
            font-size: 16px;
        }

        .nav-logo-text {
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-normal);
            color: var(--color-text-primary);
        }

        .nav-logo-text strong {
            font-weight: var(--font-weight-semibold);
        }

        .nav-menu {
            flex: 1;
            padding: var(--space-16);
            overflow-y: auto;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: var(--space-12);
            padding: var(--space-12) var(--space-16);
            border-radius: var(--radius-md);
            color: var(--color-text-secondary);
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-medium);
            cursor: pointer;
            transition: all var(--transition-fast);
            border: 1px solid transparent;
        }

        .nav-item:hover {
            background: var(--color-surface-hover);
            color: var(--color-text-primary);
        }

        .nav-item.active {
            background: var(--color-bg-elevated);
            color: var(--color-tr-orange);
            border-color: var(--color-border-medium);
        }

        .nav-footer {
            padding: var(--space-16);
            border-top: 1px solid var(--color-border-subtle);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-bar {
            height: 64px;
            background: var(--color-bg-secondary);
            border-bottom: 1px solid var(--color-border-subtle);
            display: flex;
            align-items: center;
            padding: 0 var(--page-padding);
            gap: var(--space-16);
        }

        .menu-toggle {
            display: none;
            width: 36px;
            height: 36px;
            border: none;
            background: transparent;
            color: var(--color-text-secondary);
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: all var(--transition-fast);
        }

        .menu-toggle:hover {
            background: var(--color-surface-hover);
            color: var(--color-text-primary);
        }

        .top-bar-title {
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-semibold);
            color: var(--color-text-primary);
        }

        .content-wrapper {
            flex: 1;
            overflow-y: auto;
            background: var(--color-bg-primary);
        }

        .content-inner {
            max-width: var(--content-max-width);
            margin: 0 auto;
            padding: var(--page-padding);
        }

        /* ============================================
           CHAT COMPONENTS
           ============================================ */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 64px - 48px);
            gap: var(--space-24);
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: var(--space-16) 0;
        }

        .message {
            margin-bottom: var(--space-24);
            animation: messageSlideIn var(--transition-normal);
        }

        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: var(--space-8);
            margin-bottom: var(--space-8);
        }

        .message-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-medium);
        }

        .message.user .message-avatar {
            background: var(--color-tr-orange);
            color: var(--color-text-inverse);
        }

        .message.assistant .message-avatar {
            background: var(--color-primary);
            color: var(--color-text-inverse);
        }

        .message-author {
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-medium);
            color: var(--color-text-primary);
        }

        .message-time {
            font-size: var(--font-size-xs);
            color: var(--color-text-muted);
        }

        .message-content {
            margin-left: 36px;
            padding: var(--space-16);
            background: var(--color-surface-card);
            border: 1px solid var(--color-border-subtle);
            border-radius: var(--radius-md);medium);
            border-radius: var(--radius-md);
            font-size: var(--font-size-sm);
            line-height: var(--line-height-relaxed);
            color: var(--color-text-primary);
        }

        .message.user .message-content {
            background: var(--color-bg-tertiary);
            color: var(--color-text-primary);
            border-color: var(--color-border-medium)

        .message-sources {
            margin-left: 36px;
            margin-top: var(--space-12);
        }

        .sources-toggle {
            font-size: var(--font-size-xs);
            color: var(--color-text-muted);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: var(--space-4);
            padding: var(--space-4) var(--space-8);
            border-radius: var(--radius-sm);
            transition: all var(--transition-fast);
        }

        .sources-toggle:hover {
            color: var(--color-text-secondary);
            background: var(--color-surface-hover);
        }

        .sources-list {
            display: none;
            margin-top: var(--space-8);
            padding: var(--space-12);
            background: var(--color-bg-elevated);
            border: 1px solid var(--color-border-subtle);
            border-radius: var(--radius-md);
            font-size: var(--font-size-xs);
            gap: var(--space-8);
        }

        .sources-list.expanded {
            display: flex;
            flex-direction: column;
        }

        .source-item {
            padding: var(--space-8);
            background: var(--color-surface-card);
            border-radius: var(--radius-sm);
            color: var(--color-text-secondary);
            line-height: var(--line-height-tight);
        }

        .source-file {
            font-weight: var(--font-weight-medium);
            color: var(--color-primary);
        }

        /* Input Area */
        .input-area {
            background: var(--color-surface-card);
            border: 1px solid var(--color-border-medium);
            border-radius: var(--radius-lg);
            padding: var(--space-16);
            display: flex;
            gap: var(--space-12);
            transition: border-color var(--transition-fast);
        }

        .input-area:focus-within {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
        }

        .input-field {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--color-text-primary);
            font-family: var(--font-family);
            font-size: var(--font-size-base);
            outline: none;
            resize: none;
            max-height: 120px;
            line-height: var(--line-height-normal);
        }

        .input-field::placeholder {
            color: var(--color-text-muted);
        }

        /* ============================================
           BUTTONS
           ============================================ */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-8);
            padding: var(--space-12) var(--space-24);
            font-family: var(--font-family);
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-medium);
            border-radius: var(--radius-md);
            border: none;
            cursor: pointer;
            transition: all var(--transition-fast);
            white-space: nowrap;
        }

        .btn:focus-visible {
            outline: 2px solid var(--color-primary);
            outline-offset: 2px;
        }

        .btn-primary {
            background: var(--color-primary);
            color: var(--color-text-inverse);
        }

        .btn-primary:hover {
            background: var(--color-primary-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .btn-primary:active {
            background: var(--color-primary-active);
            transform: translateY(0);
        }

        .btn-primary:disabled {
            background: var(--color-bg-elevated);
            color: var(--color-text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: var(--color-bg-elevated);
            color: var(--color-text-primary);
            border: 1px solid var(--color-border-medium);
        }

        .btn-secondary:hover {
            background: var(--color-surface-hover);
            border-color: var(--color-border-strong);
        }

        .btn-ghost {
            background: transparent;
            color: var(--color-text-secondary);
        }

        .btn-ghost:hover {
            background: var(--color-surface-hover);
            color: var(--color-text-primary);
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            padding: 0;
        }

        /* Loading Spinner */
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--color-border-subtle);
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ============================================
           STATUS BADGE
           ============================================ */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: var(--space-4);
            padding: var(--space-4) var(--space-8);
            background: var(--color-bg-elevated);
            border: 1px solid var(--color-border-subtle);
            border-radius: var(--radius-sm);
            font-size: var(--font-size-xs);
            font-weight: var(--font-weight-medium);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--color-success);
        }

        .status-dot.online {
            background: var(--color-success);
        }

        /* ============================================
           EMPTY STATE
           ============================================ */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--space-48);
            text-align: center;
        }

        .empty-state-icon {
            width: 64px;
            height: 64px;
            background: var(--color-bg-elevated);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: var(--space-16);
        }

        .empty-state-title {
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-semibold);
            color: var(--color-text-primary);
            margin-bottom: var(--space-8);
        }

        .empty-state-description {
            font-size: var(--font-size-sm);
            color: var(--color-text-muted);
            max-width: 400px;
            line-height: var(--line-height-relaxed);
        }

        /* ============================================
           SKELETON LOADER
           ============================================ */
        .skeleton {
            background: linear-gradient(
                90deg,
                var(--color-bg-elevated) 0%,
                var(--color-surface-hover) 50%,
                var(--color-bg-elevated) 100%
            );
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s ease-in-out infinite;
            border-radius: var(--radius-sm);
        }

        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-text {
            height: 16px;
            margin-bottom: var(--space-8);
        }

        .skeleton-text.short {
            width: 60%;
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 768px) {
            .left-nav {
                position: fixed;
                top: 0;
                left: 0;
                height: 100vh;
                z-index: 100;
                box-shadow: var(--shadow-lg);
            }

            .menu-toggle {
                display: flex;
            }

            .content-inner {
                padding: var(--space-16);
            }

            .chat-container {
                height: calc(100vh - 64px - 32px);
            }

            .message-content {
                margin-left: 0;
            }

            .message-sources {
                margin-left: 0;
            }
        }

        /* ============================================
           UTILITY CLASSES
           ============================================ */
        .hidden {
            display: none !important;
        }

        .sr-only {
            position: absolute;

            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {

<body>
    <div class="app-shell">
        <!-- Left Navigation -->
        <nav class="left-nav" id="leftNav">
            <div class="nav-header">

            <div class="nav-menu">

            <div class="nav-footer">

                    <span class="status-dot"></span>
                    <span>Online</span> online"></span>
                    <span style="color: var(--color-success); font-weight: var(--font-weight-medium);"
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="6" x2="17" y2="6"/>
                        <line x1="3" y1="10" x2="17" y2="10"/>
                        <line x1="3" y1="14" x2="17" y2="14"/>
                    </svg>
                </button>
                <h1 class="top-bar-title">Confirmation Migration Assistant</h1>
            </div>ha

            <div class="content-wrapper">
                <div class="content-inner">
                    <div class="chat-container">
                        <!-- Messages Area -->
                        <div class="messages-area" id="messagesArea">
                            <div class="empty-state" id="emptyState">
                                <div class="empty-state-icon">🤖</div>
                                <h2 class="empty-state-title">Welcome to Confirmation AI</h2>
                                <p class="empty-state-description">
                                    Ask me anything about migrating from CurrentGen to NextGen, or how to use the Confirmation platform.
                                </p>
                            </div>
                        </div>

                        <!-- Input Area -->
                        <div class="input-area">
                            <textarea 
                                class="input-field" 
                                id="messageInput" 
                                placeholder="Ask about Confirmation APIs, migration, or workflows..."
                                rows="1"
                            ></textarea>
                            <button class="btn btn-primary btn-icon" id="sendBtn" aria-label="Send message">
                                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M2 10l16-8-8 16-2-8-8-2z"/>

    <script>
        // ============================================
        // APP STATE
        // ============================================
        const API_BASE_URL = window.location.origin;
        const sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);

        // ============================================
        // DOM ELEMENTS
        // ============================================
        const messagesArea = document.getElementById('messagesArea');
        const emptyState = document.getElementById('emptyState');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const menuToggle = document.getElementById('menuToggle');
        const leftNav = document.getElementById('leftNav');

        // ============================================
        // MENU TOGGLE
        // ============================================
        menuToggle?.addEventListener('click', () => {
            leftNav.classList.toggle('collapsed');
        });

        // ============================================
        // AUTO-RESIZE TEXTAREA
        // ============================================
        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
        });

        // ============================================
        // SEND MESSAGE
        // ============================================
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            // Hide empty state
            if (emptyState && !emptyState.classList.contains('hidden')) {
                emptyState.classList.add('hidden');
            }

            // Add user message
            addMessage('user', message);
            messageInput.value = '';
            messageInput.style.height = 'auto';

            // Add loading message
            const loadingId = 'loading_' + Date.now();
            addMessage('assistant', '', loadingId, true);

            try {
                const response = await fetch(`${API_BASE_URL}/chat/stream`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        session_id: sessionId,
                        message: message
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                // Remove loading message
                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) loadingEl.remove();

                // Handle streaming response
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let accumulatedResponse = '';
                let sources = [];
                const streamingMessageId = 'msg_' + Date.now();
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                
                                if (data.token) {
                                    accumulatedResponse += data.token;
                                    updateStreamingMessage(streamingMessageId, accumulatedResponse);
                                }
                                
                                if (data.sources) {
                                    sources = data.sources;
                                }
                                
                                if (data.done) {
                                    addSourcesToMessage(streamingMessageId, sources);
                                }
                            } catch (e) {
                                console.error('Error parsing SSE data:', e);
                            }
                        }
                    }
                }
            } catch (error) {
                console.error('Error sending message:', error);
                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) loadingEl.remove();
                addMessage('assistant', '❌ Error: Unable to get response. Please try again.');
            }
        }

        // ============================================
        // MESSAGE RENDERING
        // ============================================
        function addMessage(role, content, messageId, isLoading = false) {
            const messageEl = document.createElement('div');
            messageEl.className = `message ${role}`;
            if (messageId) messageEl.id = messageId;

            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

            const avatarText = role === 'user' ? 'You' : 'AI';
            const authorText = role === 'user' ? 'You' : 'Confirmation AI';

            messageEl.innerHTML = `
                <div class="message-header">
                    <div class="message-avatar">${avatarText.charAt(0)}</div>
                    <span class="message-author">${authorText}</span>
                    <span class="message-time">${timeStr}</span>
                </div>
                <div class="message-content">
                    ${isLoading ? '<div class="spinner"></div>' : formatMessage(content)}
                </div>
            `;

            messagesArea.appendChild(messageEl);
            messagesArea.scrollTop = messagesArea.scrollHeight;

            return messageEl;
        }

        function updateStreamingMessage(messageId, content) {
            let messageEl = document.getElementById(messageId);
            
            if (!messageEl) {
                messageEl = addMessage('assistant', content, messageId);
            } else {
                const contentEl = messageEl.querySelector('.message-content');
                if (contentEl) {
                    contentEl.innerHTML = formatMessage(content);
                }
            }

            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function addSourcesToMessage(messageId, sources) {
            if (!sources || sources.length === 0) return;

            const messageEl = document.getElementById(messageId);
            if (!messageEl) return;

            const sourcesEl = document.createElement('div');
            sourcesEl.className = 'message-sources';
            
            const toggleId = 'sources_' + messageId;
            const listId = 'list_' + messageId;
            
            sourcesEl.innerHTML = `
                <div class="sources-toggle" onclick="toggleSources('${listId}')">
                    📚 ${sources.length} source${sources.length > 1 ? 's' : ''}
                    <span>▼</span>
                </div>
                <div class="sources-list" id="${listId}">
                    ${sources.map(s => `
                        <div class="source-item">
                            <div class="source-file">${s.source}</div>
                            <div>${s.section}</div>
                        </div>
                    `).join('')}
                </div>
            `;

            messageEl.appendChild(sourcesEl);
        }

        function toggleSources(listId) {
            const listEl = document.getElementById(listId);
            if (listEl) {
                listEl.classList.toggle('expanded');
            }
        }

        function formatMessage(text) {
            if (!text) return '';
            
            // Basic markdown-style formatting
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/`(.*?)`/g, '<code style="background: var(--color-bg-elevated); padding: 2px 6px; border-radius: 4px; font-size: var(--font-size-sm);">$1</code>')
                .replace(/\n/g, '<br>');
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================
        sendBtn.addEventListener('click', sendMessage);

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // ============================================
        // INIT
        // ============================================
        messageInput.focus();
    </script>
</body>
</html>
